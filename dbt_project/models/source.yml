version: 2

sources:
  - name: raw
    description: "Raw tables loaded into SQLite"
    schema: main   # SQLite typically uses "main"
    tables:
      - name: raw_orders
        description: "Raw orders table"
        columns:
          - name: order_id
            tests: [not_null]
          - name: customer_id
            tests: [not_null]
          - name: amount
            tests: [not_null]
          - name: order_date
            tests: [not_null]

      - name: raw_customers
        description: "Raw customers table"
        columns:
          - name: id
            tests: [not_null, unique]
          - name: email
            tests: [not_null]